<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>VoiceFlow AI — Voice AI Platform</title>

    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="VoiceFlow AI — Voice AI Platform" />
    <meta property="og:description" content="Multi-tenant Voice AI SaaS with 12+ Indian language support, intelligent voice agents, and sub-500ms response times." />

    <meta name="twitter:image" content="/og-image.png" />

    <!-- Theme color -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="VoiceFlow AI" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "VoiceFlow AI",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Multi-tenant Voice AI SaaS platform with Indian language support and intelligent voice agents."

    </script>

    <!-- Google Fonts — Premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Google OAuth handled via popup redirect flow -->
  </head>
  <body>
    <script>
      try {
        var stored = localStorage.getItem('swetha_dark_mode');
        if (stored === 'true' || (stored === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch(e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
