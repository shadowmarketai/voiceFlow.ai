# ============================================
# VoiceFlow AI SaaS - Docker Compose
# ============================================

services:
  # ── PostgreSQL ─────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: voiceflow
      POSTGRES_USER: voiceflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-voiceflow_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiceflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── VoiceFlow API ─────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    # Forward every env var from .env automatically.
    env_file:
      - .env
    environment:
      # GEMINI_API_KEY aliases GOOGLE_API_KEY if you set only one.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-${GOOGLE_API_KEY:-}}
      DATABASE_URL: postgresql+asyncpg://voiceflow:${DB_PASSWORD:-voiceflow_secret}@postgres:5432/voiceflow
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      APP_ENV: ${APP_ENV:-production}
      # LLM Providers
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      # Telephony
      TELECMI_API_KEY: ${TELECMI_API_KEY:-}
      TELECMI_API_SECRET: ${TELECMI_API_SECRET:-}
      TELECMI_ACCOUNT_ID: ${TELECMI_ACCOUNT_ID:-}
      BOLNA_API_KEY: ${BOLNA_API_KEY:-}
      VOBIZ_API_KEY: ${VOBIZ_API_KEY:-}
      VOBIZ_SENDER_ID: ${VOBIZ_SENDER_ID:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      VONAGE_API_KEY: ${VONAGE_API_KEY:-}
      VONAGE_API_SECRET: ${VONAGE_API_SECRET:-}
      VONAGE_APPLICATION_ID: ${VONAGE_APPLICATION_ID:-}
      # SIP
      SIP_HOST: ${SIP_HOST:-}
      SIP_PORT: ${SIP_PORT:-5060}
      SIP_USERNAME: ${SIP_USERNAME:-}
      SIP_PASSWORD: ${SIP_PASSWORD:-}
      # Payments
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Corpus collection (MinIO)
      CORPUS_MINIO_ENDPOINT: http://minio:9000
      CORPUS_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-voiceflow}
      CORPUS_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-voiceflow_minio_secret}
      CORPUS_BUCKET: voiceflow-corpus
      # Voice-clone embedding store (L3 MinIO)
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-voiceflow}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-voiceflow_minio_secret}
      # Emotion intelligence (Hume Expression Measurement)
      HUME_API_KEY: ${HUME_API_KEY:-}
      # Cross-call memory
      CALLER_MEMORY_TTL_DAYS: ${CALLER_MEMORY_TTL_DAYS:-90}
      # n8n tool use
      N8N_BASE_URL: ${N8N_BASE_URL:-}
      N8N_WEBHOOK_KEY: ${N8N_WEBHOOK_KEY:-}
      TOOL_TIMEOUT_S: ${TOOL_TIMEOUT_S:-8}
      # TADA emotion TTS (requires E2E L4 GPU)
      TADA_ENABLED: ${TADA_ENABLED:-false}
      TADA_MODEL_PATH: ${TADA_MODEL_PATH:-/app/models/tada}
      TADA_DEVICE: ${TADA_DEVICE:-cuda}
    volumes:
      - recordings_data:/app/data/recordings
      - voices_data:/app/data/voices
      - logs_data:/app/logs
      - sqlite_data:/app/sqlite
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── MinIO (corpus + voice-clone L3 storage) ──
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-voiceflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-voiceflow_minio_secret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend Dev (optional, for dev mode) ──
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8001
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:
  minio_data:
  recordings_data:
  voices_data:
  logs_data:
  sqlite_data:
  frontend_node_modules:
